<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
    <link rel="stylesheet" href="/tai/dnhap.css">
</head>

<body>
    <main class="container">
        <div class="container__form">
            <div class="container__info">
                <h2>Đăng nhập</h2>
            </div>
            <form id="formDangNhap" onsubmit="return false;">
                <div class="form--field">
                    <div class="field">
                        <input type="email" id="email" placeholder="Email" required>
                    </div>
                    <div class="field">
                        <input type="password" id="password" placeholder="Mật khẩu" required>
                    </div>
                </div>
                <div class="lb">
                    <div class="remember">
                        <input type="checkbox" id="agree">
                        <label for="agree">Ghi nhớ mật khẩu</label>
                    </div>
                    <a href="#">Quên mật khẩu?</a>
                </div>
                <button class="btn" type="submit">Đăng nhập</button>
            </form>
            <div class="switch--line">
                Chưa có tài khoản? <a href="/tai/dangky.html">Đăng ký ngay</a>
            </div>
        </div>
        <div class="img">
            <img class="img-link" src="/images/camket.png" alt="Ảnh minh họa">
            <div class="img-content">
                <h2>Chào mừng trở lại!</h2>
                <p>Đăng nhập để tiếp tục sử dụng các dịch vụ tuyệt vời của chúng tôi.</p>
            </div>
        </div>
    </main>
    <script src="/tai/dkdn.js"></script>
</body>

</html>
