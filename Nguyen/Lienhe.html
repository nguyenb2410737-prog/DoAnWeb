<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liên hệ</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: "Times New Roman" Arial, sans-serif;
    }

    body{
        background:#f2f2f2;
        display:flex;
        justify-content:center;
        padding:40px 20px;
    }

    .contact-box{
        width:850px;
        background:#f5f5f5;
        padding:25px;
    }

    .contact-box h3{
        margin-bottom:20px;
        font-size:24px;
        color:#333;
    }

    .input-box{
        width:100%;
        margin-bottom:15px;
    }

    .input-box input,
    .input-box textarea{
        width:100%;
        border:1px solid #ccc;
        padding:14px;
        font-size:18px;
        outline:none;
    }

    .input-box textarea{
        height:140px;
        resize:none;
    }

    button{
        width:100%;
        background:#d90000;
        color:white;
        border:none;
        padding:16px;
        font-size:22px;
        cursor:pointer;
    }

    button:hover{
        background:#b80000;
    }
    </style>
    <link rel="stylesheet" href="/Nguyen/main.css">
</head>
<header class="header">
        <div class="header_logo">
                <img src="/images/logo-ngang.png" alt="Logo">
        </div>
        <ul id="nav">
            <li><a href="/Nguyen/trangchu.html" class="header_a">Trang chủ</a></li>
            <li><a href="/Phuc/SanPham.html" class="header_a">Kho xe</a></li>
            <li><a href="/tai/suachuachung.html" class="header_a">Dịch vụ</a></li>
            <li><a href="/" class="header_a">Giới thiệu</a></li>
            <li><a href="/Nguyen/Lienhe.html" class="header_a--active">Liên hệ</a></li>
        </ul>

        <div class="header_icon">
            <div class="icon_group">
                <div class="chuong">
                    <a href="/Nguyen/thongbao.html"><img src="/images/chuong.png"></a>
                </div>

                <div class="basket">
                    <a href="/Nguyen/giohang.html"><img src="/images/giohang.png"></a>
                </div>
            </div>

            <a href="/Nguyen/Dangnhap.html"><button class="header_button">Đăng nhập</button></a>
        </div>
</header>

<body>
    <div class="contact-box">
        <h3>LIÊN HỆ VỚI CHÚNG TÔI</h3>

        <div class="input-box">
            <input type="text" placeholder="Họ tên*">
        </div>

        <div class="input-box">
            <input type="email" placeholder="Email*">
        </div>

        <div class="input-box">
            <input type="tel" placeholder="Số điện thoại*">
        </div>

        <div class="input-box">
            <textarea placeholder="Nhập nội dung*"></textarea>
        </div>

        <button>Gửi liên hệ của bạn</button>
    </div>

</body>
</html>
