<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Trang tìm kiếm xe ô tô mới và xe đã qua sử dụng" />
  <title>Sản Phẩm</title>
  <link rel="stylesheet" href="SanPham.css" />
</head>

<body>

  <div class="page-wrapper">
<header class="header">
        <div class="header_logo">
                <img src="/DoAnWeb/images/logo.png" alt="Logo">
        </div>
        <ul id="nav">
            <li><a href="" class="header_a--active" href="/Nguyen/trangchu.html">Trang chủ</a></li>
            <li><a href="" class="header_a">Sản phẩm</a></li>
            <li><a href="" class="header_a">Dịch vụ</a></li>
            <li><a href="" class="header_a">Giới thiệu</a></li>
            <li><a href="" class="header_a">Liên hệ</a></li>
        </ul>

        <div class="header_icon">
            <div class="icon_group">
                <div class="chuong">
                    <a href="/Nguyen/thongbao.html"><img src="/images/chuong.png"></a>
                </div>

                <div class="basket">
                    <a href="/Nguyen/giohang.html"><img src="/images/giohang.png"></a>
                </div>
            </div>

            <button class="header_button">Đăng nhập</button>
        </div>

    
</header>
    <header class="search-header">
      <div class="search-bar" role="search">
        <div class="search-bar__input-wrap">
          <span class="search-bar__icon" aria-hidden="true">🔍</span>
          <input type="search" class="search-bar__input"placeholder="Nhập tên xe, hãng, phiên bản..." aria-label="Tìm kiếm xe"/>
        </div>
        <button type="button" class="btn-search" aria-label="Tìm kiếm">🔍 TÌM KIẾM</button>
        <button type="button" class="btn-filter" aria-label="Lọc nâng cao">⚙ Lọc nâng cao</button>
      </div>

      <nav class="suggestions" aria-label="Gợi ý tìm kiếm">
        <span class="suggestions__label">Gợi ý:</span>
        <button type="button" class="suggestions__pill">🔥 RAV4 2025</button>
        <button type="button" class="suggestions__pill">Camry Hybrid</button>
        <button type="button" class="suggestions__pill">CR-V 2024</button>
        <button type="button" class="suggestions__pill">Xe cũ dưới 500tr</button>
        <button type="button" class="suggestions__pill">BMW 3 Series</button>
        <button type="button" class="suggestions__pill">Fortuner 2023</button>
      </nav>
    </header>
    <div id="search-results"></div>

    <nav class="tabs" role="tablist" aria-label="Danh mục xe">
      <a href="SanPham.html" class="tabs__item tabs__item--active" role="tab" aria-selected="true">🚗 Ô tô</a>
      <a href="SP-XM.html" class="tabs__item" role="tab" aria-selected="false">🛵 Xe máy</a>
      <a href="SP-XC.html" class="tabs__item" role="tab" aria-selected="false">🕐 Xe đã qua sử dụng</a>
    </nav>

    <div class="body-layout">
      <aside class="sidebar" aria-label="Bộ lọc">
        <div class="sidebar__header">
          <span class="sidebar__title">BỘ LỌC</span>
          <button type="button" class="sidebar__reset">Đặt lại</button>
        </div>

        <section class="filter-section" aria-labelledby="filter-type-label">
          <span class="filter-section__label" id="filter-type-label">Loại xe</span>
          <div class="type-pills" role="group" aria-label="Chọn loại xe">
            <button type="button" class="type-pill">Sedan</button>
            <button type="button" class="type-pill">Coupe</button>
            <button type="button" class="type-pill">Pickup</button>
            <button type="button" class="type-pill">MPV</button>
            <button type="button" class="type-pill">Hatchback</button>
          </div>
        </section>

        <section class="filter-section" aria-labelledby="filter-brand-label">
          <div class="filter-section__header">
            <span class="filter-section__label" id="filter-brand-label">Hãng xe</span>
            <button type="button" class="filter-section__see-more">Xem thêm</button>
          </div>

          <div class="brand-row">
            <input
              type="checkbox"
              id="brand-toyota"
              class="brand-row__checkbox"
              checked
            />
            <label for="brand-toyota" class="brand-row__label brand-row__label--checked">Toyota</label>
          </div>

          <div class="brand-row">
            <input
              type="checkbox"
              id="brand-honda"
              class="brand-row__checkbox"
              checked
            />
            <label for="brand-honda" class="brand-row__label brand-row__label--checked">Honda</label>
          </div>

          <div class="brand-row">
            <input type="checkbox" id="brand-hyundai" class="brand-row__checkbox" />
            <label for="brand-hyundai" class="brand-row__label">Hyundai</label>
          </div>

          <div class="brand-row">
            <input type="checkbox" id="brand-kia" class="brand-row__checkbox" />
            <label for="brand-kia" class="brand-row__label">Kia</label>
          </div>

          <div class="brand-row">
            <input type="checkbox" id="brand-bmw" class="brand-row__checkbox" />
            <label for="brand-bmw" class="brand-row__label">BMW</label>
          </div>

          <div class="brand-row">
            <input type="checkbox" id="brand-bmw" class="brand-row__checkbox" />
            <label for="brand-bmw" class="brand-row__label">Mercedes</label>
          </div>
        </section>

        <section class="price-filter">
          <span class="price-filter__label">Chọn mức giá:</span>

          <div class="price-options">
            <button class="price-pill">Dưới 500tr</button>
            <button class="price-pill">1 tỷ - 2 tỷ</button>
            <button class="price-pill">2 tỷ - 3 tỷ</button>
            <button class="price-pill">Trên 3 tỷ</button>
          </div>
          </section>

      </aside>

        <section class="featured" aria-labelledby="featured-title">
          <h2 class="featured__title" id="featured-title">XE NỔI BẬT</h2>
          <a href="xeoto1.html">  
            <div class="featured__cards">
            <article class="featured-card">
              <span class="fc-badge fc-badge--hot">HOT</span>
              <div class="fc-icon" aria-hidden="true"><img src="/images/2025_BMW_3-series_3_1600.jpg" alt="BWM series"></div>
              <p class="fc-name">BMW 3 Series 2025</p>
              <p class="fc-price">1.85 tỷ</p>
            </article>
          </div>
        </a>
        
            <div class="results-header">
            <p class="results-count">Tìm thấy</p>  
        </div>

        <section class="car-grid" aria-label="Danh sách xe">

          <article class="car-card">
            <span class="cc-badge cc-badge--new">MỚI</span>
            <div class="fc-icon fc-icon--blue fc-icon--no-badge" aria-hidden="true"><img src="images/Mercedes-E300.jpg" alt="e300"></div>
            <h3 class="cc-name">Mercedes E300</h3>
            <p class="cc-meta">🚘 Sedan · Tự động · 2,6 tỷ</p>
       
          </article>

          <article class="car-card car-card--new">
            <span class="cc-badge cc-badge--new">MỚI</span>
            <div class="fc-icon fc-icon--blue fc-icon--no-badge" aria-hidden="true"><img src="images/mec-c300.jpg" alt="c300"></div>
            <h3 class="cc-name">Mercedes-C300</h3>
            <p class="cc-meta">🚘 Sedan · Tự động · 2 tỷ</p>
          </article>
        </section>



        </section>

      </main>

    </div>

  </div>

  <script src="SanPham.js"></script>
</body>
</html>
