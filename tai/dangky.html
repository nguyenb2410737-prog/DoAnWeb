<!doctype html>
<html lang="vi" data-bs-theme="light">

<head>
    <title>Đăng ký</title>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/tai/danky.css">

</head>

<body>
    <header>
        <!-- place navbar here -->
    </header>
    <main class="container">
        <div class="container__form">
            <div class="container__form--inner">
                <h1 class="title">Đăng ký</h1>
                <form onsubmit="return false;" id="formDangKy"> <!--de submit khong bi mat du lieu -->
                    <div class="field">
                        <input type="text" placeholder="Họ và tên" id="fullname">
                        <small class="notification">Không được để trống</small>
                    </div>
                    <div class="field">
                        <input type="email" placeholder="Email" id="email">
                        <small class="notification">Email không hợp lệ</small>
                    </div>
                    <div class="field">
                        <input type="password" placeholder="Mật khẩu" id="pwReg1">
                        <small class="notification">Ít nhất 6 ký tự</small>
                    </div>
                    <div class="field">
                        <input type="password" placeholder="Xác nhận mật khẩu" id="pwReg2">
                        <small class="notification">Mật khẩu không khớp</small>
                    </div>
                    <div class="terms">
                        <input type="checkbox" id="agree">
                        <label for="agree">Tôi đồng ý với <a href="https://privacycompliance.vn/wp-content/uploads/2025/06/Dieu-khoan-su-dung-250616.pdf">Điều khoản sử dụng</a> và <a href="https://thuvienphapluat.vn/page/viewcontentleft.aspx?key=86">Chính sách bảo mật</a></label>
                    </div>
                    <button class="btn-primary" type="submit">ĐĂNG KÝ</button>
                </form>
                <div class="switch--line">
                    Đã có tài khoản? <a href="/tai/dnhap.html">Đăng nhập ngay</a>
                </div>
            </div>
        </div>
        <div class="img">
            <img class="img-link" src="/images/camket.png" alt="Ảnh minh họa">
            <div class="img-content">
                <h2>Tạo tài khoản mới</h2>
                <p>Tham gia cùng chúng tôi và tận hưởng những trải nghiệm tuyệt vời.</p>
            </div>
        </div>
    </main>
    <footer>

    </footer>
    <script src="/tai/dkdn.js"></script>
</body>

</html>
